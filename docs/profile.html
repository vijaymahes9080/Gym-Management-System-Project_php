<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Member Profile">
    <meta name="author" content="Vijay Mahes">
    <title>About Fitness - Profile</title>
    
    <!-- Bootstrap core CSS -->
    <link href="boot/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles for this template -->
    <link href="boot/css/main.css" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.10.4/themes/smoothness/jquery-ui.css" rel="stylesheet">
  </head>

  <body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="index.html">About Fitness</a>
        </div>
        <div class="collapse navbar-collapse">
          <ul class="nav navbar-nav" id="nav-links">
            <!-- Dynamic via static-demo.js -->
          </ul>
          <div id="nav-auth">
            <!-- Dynamic via static-demo.js -->
          </div>
        </div><!--/.navbar-collapse -->
      </div>
    </div>

    <div class="jumbotron">
      <div class="container">
        <h2>Member Profile</h2>
        <div class="row" style="background-color: white; padding: 25px; border-radius: 10px;">
          <div class="col-md-3 text-center">
            <img src="img/dc.png" alt="Profile Picture" class="img-circle" style="max-height: 120px;">
            <h3 id="prof-username">Guest</h3>
            <span id="prof-paid" class="label label-warning">Unpaid</span>
          </div>
          <div class="col-md-9">
            <table class="table">
              <tr>
                <th>Email Address</th>
                <td id="prof-email">-</td>
              </tr>
              <tr>
                <th>Attendance rate</th>
                <td id="prof-attendance">0%</td>
              </tr>
            </table>

            <h3>Edit Profile Info</h3>
            <form id="profile-edit-form" class="form-inline">
              <div class="form-group">
                <label for="edit-email" class="sr-only">Email</label>
                <input type="email" class="form-control" id="edit-email" placeholder="New Email" required style="width: 300px;">
              </div>
              <button type="submit" class="btn btn-warning">Save Changes</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <hr>
      <footer>
        <p>&copy; Vijay Mahes</p>
      </footer>
    </div>

    <!-- Bootstrap core JavaScript -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <script src="boot/js/bootstrap.min.js"></script>
    <script src="boot/js/static-demo.js"></script>
  </body>
</html>
