<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Member Attendance">
    <meta name="author" content="Vijay Mahes">
    <title>About Fitness - Attendance</title>
    
    <!-- Bootstrap core CSS -->
    <link href="boot/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles for this template -->
    <link href="boot/css/main.css" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.10.4/themes/smoothness/jquery-ui.css" rel="stylesheet">
  </head>

  <body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="index.html">About Fitness</a>
        </div>
        <div class="collapse navbar-collapse">
          <ul class="nav navbar-nav" id="nav-links">
            <!-- Dynamic via static-demo.js -->
          </ul>
          <div id="nav-auth">
            <!-- Dynamic via static-demo.js -->
          </div>
        </div><!--/.navbar-collapse -->
      </div>
    </div>

    <div class="jumbotron">
      <div class="container">
        <h2>My Attendance History</h2>
        <div class="row" style="background-color: white; padding: 25px; border-radius: 10px;">
          <div class="col-md-12">
            <h4 id="attendance-label">Current attendance rate: 0%</h4>
            <div class="progress progress-striped active" style="height: 30px;">
              <div class="progress-bar progress-bar-success" id="attendance-progress" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" style="width: 0%; font-size: 1.2em; line-height: 30px;">
                Attendance
              </div>
            </div>
            <p class="text-muted" style="margin-top: 15px;">
              Note: Attendance is updated daily by gym administrators. If there are any discrepancies, please reach out to the desk staff.
            </p>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <hr>
      <footer>
        <p>&copy; Vijay Mahes</p>
      </footer>
    </div>

    <!-- Bootstrap core JavaScript -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <script src="boot/js/bootstrap.min.js"></script>
    <script src="boot/js/static-demo.js"></script>
  </body>
</html>
