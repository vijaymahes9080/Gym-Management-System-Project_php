<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Register Member">
    <meta name="author" content="Vijay Mahes">
    <title>About Fitness - Register</title>
    
    <!-- Bootstrap core CSS -->
    <link href="boot/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom styles for this template -->
    <link href="boot/css/main.css" rel="stylesheet">
    <link href="https://code.jquery.com/ui/1.10.4/themes/smoothness/jquery-ui.css" rel="stylesheet">
    
    <style>
      .form-signin {
        max-width: 330px;
        padding: 15px;
        margin: 0 auto;
      }
      .form-signin .form-control {
        position: relative;
        height: auto;
        -webkit-box-sizing: border-box;
           -moz-box-sizing: border-box;
                box-sizing: border-box;
        padding: 10px;
        font-size: 16px;
      }
      .form-signin .form-control:focus {
        z-index: 2;
      }
      .form-signin input[type="text"],
      .form-signin input[type="password"] {
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="navbar navbar-inverse navbar-fixed-top" role="navigation">
      <div class="container">
        <div class="navbar-header">
          <button type="button" class="navbar-toggle" data-toggle="collapse" data-target=".navbar-collapse">
            <span class="sr-only">Toggle navigation</span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
            <span class="icon-bar"></span>
          </button>
          <a class="navbar-brand" href="index.html">About Fitness</a>
        </div>
        <div class="collapse navbar-collapse">
          <ul class="nav navbar-nav" id="nav-links">
            <!-- Dynamic via static-demo.js -->
          </ul>
          <div id="nav-auth">
            <!-- Dynamic via static-demo.js -->
          </div>
        </div><!--/.navbar-collapse -->
      </div>
    </div>

    <div class="jumbotron">
      <div class="container text-center">
        <h2>Register Member</h2>
        <form class="form-signin" id="register-form">
          <div class="control-group">
            <input type="text" class="form-control" placeholder="Username" id="username" required autofocus>
          </div>
          <div class="control-group">
            <input type="text" class="form-control" placeholder="Email Address" id="email" required>
          </div>
          <div class="control-group">
            <input type="password" class="form-control" placeholder="Password" id="password" required>
          </div>
          <div class="control-group">
            <input type="password" class="form-control" placeholder="Password Confirmation" id="confirmpwd" required>
          </div>
          <button class="btn btn-lg btn-primary btn-block" type="submit">Create Account</button>
        </form>
      </div>
    </div>

    <div class="container">
      <hr>
      <footer>
        <p>&copy; Vijay Mahes</p>
      </footer>
    </div>

    <!-- Bootstrap core JavaScript -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
    <script src="boot/js/bootstrap.min.js"></script>
    <script src="boot/js/static-demo.js"></script>
  </body>
</html>
